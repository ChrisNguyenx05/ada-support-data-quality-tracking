services:
  - type: web
    name: ada-dq-checker-api
    env: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DQ_OUTPUT_DIR
        value: /tmp/dq_outputs
